services:
  traefik:
    image: traefik:v3.6
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "80:80"
      - "443:443"
    environment:
      TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL: ${ACME_EMAIL:?defina ACME_EMAIL no .env}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/static/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./secrets/dashboard.htpasswd:/etc/traefik/dashboard.htpasswd:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - edge
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN:?defina DOMAIN no .env}`)"
        - traefik.http.routers.traefik-dashboard.entrypoints=websecure
        - traefik.http.routers.traefik-dashboard.tls=true
        - traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt
        - traefik.http.routers.traefik-dashboard.middlewares=traefik-dashboard-auth@file
        - traefik.http.routers.traefik-dashboard.service=api@internal
        - traefik.http.services.traefik.loadbalancer.server.port=80

networks:
  edge:
    external: true
    name: infra_edge

volumes:
  traefik_letsencrypt:
