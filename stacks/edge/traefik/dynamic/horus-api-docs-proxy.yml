# Proxy reverso: browser em https://horus-api…/docs/* mas o upstream (horus-api-docs)
# só serve na raiz — remove-se o prefixo /docs antes do forward (query string mantém-se).
http:
  middlewares:
    horus-api-docs-stripprefix:
      stripPrefix:
        prefixes:
          - /docs

    horus-api-docs-proxy-headers:
      headers:
        customRequestHeaders:
          Host: "horus-api-docs.lucaskaiut.com.br"
          X-Forwarded-Host: "horus-api.lucaskaiut.com.br"
          X-Forwarded-Proto: "https"

  services:
    horus-api-docs-origin:
      loadBalancer:
        passHostHeader: false
        servers:
          - url: "https://horus-api-docs.lucaskaiut.com.br"

  routers:
    horus-api-docs-proxy:
      rule: Host(`horus-api.lucaskaiut.com.br`) && PathPrefix(`/docs`)
      entryPoints:
        - websecure
      middlewares:
        - horus-api-docs-stripprefix
        - horus-api-docs-proxy-headers
      service: horus-api-docs-origin
      tls:
        certResolver: letsencrypt
      priority: 100
