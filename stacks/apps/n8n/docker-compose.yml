name: infra-app-n8n

services:
  n8n:
    image: n8nio/n8n:1.99.1
    container_name: infra_n8n
    restart: unless-stopped
    env_file:
      - .env
    environment:
      N8N_HOST: n8n.${DOMAIN:?defina DOMAIN no .env da stack}
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n.${DOMAIN}/
      N8N_PROXY_HOPS: "1"
      N8N_SECURE_COOKIE: "true"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - edge
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5678/healthz >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    labels:
      - traefik.enable=true
      - traefik.http.routers.n8n.rule=Host(`n8n.${DOMAIN}`)
      - traefik.http.routers.n8n.entrypoints=websecure
      - traefik.http.routers.n8n.tls=true
      - traefik.http.routers.n8n.tls.certresolver=letsencrypt
      - traefik.http.services.n8n.loadbalancer.server.port=5678
      - traefik.http.services.n8n.loadbalancer.healthcheck.path=/healthz
      - traefik.http.services.n8n.loadbalancer.healthcheck.interval=15s
      - traefik.http.services.n8n.loadbalancer.healthcheck.timeout=5s

networks:
  edge:
    external: true
    name: infra_edge

volumes:
  n8n_data:
