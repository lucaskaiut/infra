name: infra-app-ematricula

services:
  app:
    image: local/ematricula-app:latest
    build:
      context: .
      dockerfile: image/Dockerfile
    container_name: infra_ematricula_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: web
    networks:
      - edge
      - shared_data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/up || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s
    labels:
      - traefik.enable=true
      - traefik.http.routers.ematricula-api.rule=Host(`ematricula-api.lucaskaiut.com.br`)
      - traefik.http.routers.ematricula-api.entrypoints=websecure
      - traefik.http.routers.ematricula-api.tls.certresolver=letsencrypt
      - traefik.http.services.ematricula-api.loadbalancer.server.port=80

  horizon:
    image: local/ematricula-app:latest
    container_name: infra_ematricula_horizon
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: horizon
    depends_on:
      app:
        condition: service_healthy
    networks:
      - shared_data

  scheduler:
    image: local/ematricula-app:latest
    container_name: infra_ematricula_scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: scheduler
    depends_on:
      app:
        condition: service_healthy
    networks:
      - shared_data

networks:
  edge:
    external: true
    name: infra_edge
  shared_data:
    external: true
    name: infra_shared
