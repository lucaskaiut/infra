name: infra-app-ematricula

services:
  app:
    image: local/ematricula-app:latest
    build:
      context: .
      dockerfile: image/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: web
    networks:
      - edge
      - shared_data
    stop_grace_period: 45s
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/up || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s
    labels:
      - traefik.enable=true
      - traefik.http.routers.ematricula-api.rule=Host(`ematricula-api.${DOMAIN:?defina DOMAIN no .env da stack}`)
      - traefik.http.routers.ematricula-api.entrypoints=websecure
      - traefik.http.routers.ematricula-api.tls=true
      - traefik.http.routers.ematricula-api.tls.certresolver=letsencrypt
      - traefik.http.services.ematricula-api.loadbalancer.server.port=80
      - traefik.http.services.ematricula-api.loadbalancer.healthcheck.path=/up
      - traefik.http.services.ematricula-api.loadbalancer.healthcheck.interval=5s
      - traefik.http.services.ematricula-api.loadbalancer.healthcheck.timeout=4s

  horizon:
    image: local/ematricula-app:latest
    container_name: infra_ematricula_horizon
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: horizon
    depends_on:
      app:
        condition: service_healthy
    networks:
      - shared_data

  scheduler:
    image: local/ematricula-app:latest
    container_name: infra_ematricula_scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: scheduler
    depends_on:
      app:
        condition: service_healthy
    networks:
      - shared_data

networks:
  edge:
    external: true
    name: infra_edge
  shared_data:
    external: true
    name: infra_shared
