services:
  app:
    image: local/nox-schduler-app:latest
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: web
    networks:
      - edge
      - shared_data
    stop_grace_period: 45s
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s
    deploy:
      mode: replicated
      replicas: 2
      update_config:
        order: start-first
        parallelism: 1
        delay: 15s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
      labels:
        - traefik.enable=true
        - "traefik.http.routers.nox-schduler-api.rule=Host(`api.${DOMAIN:?defina DOMAIN no .env da stack}`)"
        - traefik.http.routers.nox-schduler-api.entrypoints=websecure
        - traefik.http.routers.nox-schduler-api.tls=true
        - traefik.http.routers.nox-schduler-api.tls.certresolver=letsencrypt
        - traefik.http.services.nox-schduler-api.loadbalancer.server.port=80
        - traefik.http.services.nox-schduler-api.loadbalancer.healthcheck.path=/api/health
        - traefik.http.services.nox-schduler-api.loadbalancer.healthcheck.interval=5s
        - traefik.http.services.nox-schduler-api.loadbalancer.healthcheck.timeout=4s

  horizon:
    image: local/nox-schduler-app:latest
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: horizon
    networks:
      - shared_data
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager

  scheduler:
    image: local/nox-schduler-app:latest
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: scheduler
    networks:
      - shared_data
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager

networks:
  edge:
    external: true
    name: infra_edge
  shared_data:
    external: true
    name: infra_shared
