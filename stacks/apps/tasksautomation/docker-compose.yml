name: infra-app-tasksautomation

services:
  app:
    image: local/tasksautomation-app:latest
    build:
      context: .
      dockerfile: image/Dockerfile
      args:
        APP_GIT_COMMIT: ${APP_GIT_COMMIT:-unknown}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: web
    networks:
      - edge
      - shared_data
    stop_grace_period: 45s
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/up || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s
    labels:
      - traefik.enable=true
      - traefik.http.routers.tasksautomation-web.rule=Host(`tasksautomation.${DOMAIN:?defina DOMAIN no .env da stack}`)
      - traefik.http.routers.tasksautomation-web.entrypoints=websecure
      - traefik.http.routers.tasksautomation-web.tls=true
      - traefik.http.routers.tasksautomation-web.tls.certresolver=letsencrypt
      - traefik.http.services.tasksautomation-web.loadbalancer.server.port=80
      - traefik.http.services.tasksautomation-web.loadbalancer.healthcheck.path=/up
      - traefik.http.services.tasksautomation-web.loadbalancer.healthcheck.interval=5s
      - traefik.http.services.tasksautomation-web.loadbalancer.healthcheck.timeout=4s

  worker:
    image: local/tasksautomation-app:latest
    container_name: infra_tasksautomation_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: worker
    depends_on:
      app:
        condition: service_healthy
    networks:
      - shared_data

  scheduler:
    image: local/tasksautomation-app:latest
    container_name: infra_tasksautomation_scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: scheduler
    depends_on:
      app:
        condition: service_healthy
    networks:
      - shared_data

networks:
  edge:
    external: true
    name: infra_edge
  shared_data:
    external: true
    name: infra_shared
