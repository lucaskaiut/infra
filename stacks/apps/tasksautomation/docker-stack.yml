services:
  app:
    image: local/tasksautomation-app:latest
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: web
      TASKS_REALTIME_BRIDGE_HOST: websocket
      TASKS_REALTIME_BRIDGE_PORT: "8082"
      TASKS_REALTIME_WS_PATH: /ws/tasks
      TASKS_REALTIME_TOKEN_TTL_SECONDS: "28800"
    networks:
      - edge
      - shared_data
    stop_grace_period: 45s
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/up || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s
    deploy:
      mode: replicated
      replicas: 2
      update_config:
        order: start-first
        parallelism: 1
        delay: 15s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
      labels:
        - traefik.enable=true
        - "traefik.http.routers.tasksautomation-web.rule=Host(`tasksautomation.${DOMAIN:?defina DOMAIN no .env da stack}`)"
        - traefik.http.routers.tasksautomation-web.entrypoints=websecure
        - traefik.http.routers.tasksautomation-web.tls=true
        - traefik.http.routers.tasksautomation-web.tls.certresolver=letsencrypt
        - traefik.http.services.tasksautomation-web.loadbalancer.server.port=80
        - traefik.http.services.tasksautomation-web.loadbalancer.healthcheck.path=/up
        - traefik.http.services.tasksautomation-web.loadbalancer.healthcheck.interval=5s
        - traefik.http.services.tasksautomation-web.loadbalancer.healthcheck.timeout=4s

  worker:
    image: local/tasksautomation-app:latest
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: worker
      TASKS_REALTIME_BRIDGE_HOST: websocket
      TASKS_REALTIME_BRIDGE_PORT: "8082"
      TASKS_REALTIME_WS_PATH: /ws/tasks
      TASKS_REALTIME_TOKEN_TTL_SECONDS: "28800"
    networks:
      - shared_data
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager

  scheduler:
    image: local/tasksautomation-app:latest
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: scheduler
      TASKS_REALTIME_BRIDGE_HOST: websocket
      TASKS_REALTIME_BRIDGE_PORT: "8082"
      TASKS_REALTIME_WS_PATH: /ws/tasks
      TASKS_REALTIME_TOKEN_TTL_SECONDS: "28800"
    networks:
      - shared_data
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager

  websocket:
    image: local/tasksautomation-app:latest
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: websocket
      TASKS_REALTIME_BRIDGE_HOST: websocket
      TASKS_REALTIME_BRIDGE_PORT: "8082"
      TASKS_REALTIME_WS_PATH: /ws/tasks
      TASKS_REALTIME_TOKEN_TTL_SECONDS: "28800"
    command: ["php", "artisan", "tasks:websocket", "--host=0.0.0.0", "--bridge-host=0.0.0.0"]
    networks:
      - shared_data
    stop_grace_period: 45s
    deploy:
      mode: replicated
      replicas: 1
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
      placement:
        constraints:
          - node.role == manager

networks:
  edge:
    external: true
    name: infra_edge
  shared_data:
    external: true
    name: infra_shared
